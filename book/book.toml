[book]
authors = ["Paul Adamson"]
language = "en"
src = "src"
title = "mdbook-listings"
description = "Managed code listings for mdbook: inline callouts, freezing, and verification"

[build]
# Render HTML + typst-pdf under `book/build/` (rather than mdbook's default
# `book/book/`, which reads awkwardly next to the `book/` repo directory).
build-dir = "build"

# Renders admonish note blocks (used in PDF output for inline callouts, and
# throughout the prose). Requires `cargo install mdbook-admonish`.
[preprocessor.admonish]
command = "mdbook-admonish"
assets_version = "3.1.0" # do not edit: managed by `mdbook-admonish install`

[preprocessor.listings]
command = "mdbook-listings"
before = ["admonish"]

[output.html]
additional-css = ["./mdbook-admonish.css", "./mdbook-listings.css"]

# Requires `cargo install mdbook-typst-pdf`. `pdf = true` makes it actually
# compile to PDF; without it, the renderer is a no-op (it only emits a `.typ`
# source file at most). `custom-template` swaps out mdbook-typst-pdf's
# default template (which references Noto fonts that aren't installed in CI
# or on the author's local box, producing font-substitution warnings and
# ugly fallbacks) for one that uses fonts we actually install.
[output.typst-pdf]
pdf = true
custom-template = "template.typ"
