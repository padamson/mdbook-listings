# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
# `wildcards` is set to "warn" rather than "deny" because cargo-deny
# misreads `{ workspace = true }` inheritance as a literal `*` version
# requirement. Once cargo-deny is bumped to a release that understands
# workspace deps natively, this can flip back to "deny".
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
# winnow appears twice because mdbook-core (mdbook 0.5) pulls toml 0.9 →
# winnow 0.7, while our own toml 1.1 / toml_edit 0.25 deps pull winnow 1.0.
# Both are transitive; we can't unify until mdbook-core upgrades its
# toml. Skip-tree the older one's parent to silence the duplicate.
skip-tree = [
    { name = "mdbook-core" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Dogfood the unreleased v0.13.0 work in the upstream playwright-rs main
# branch (tracing instrumentation, ARIA snapshots, the macros and trace
# crates). Cargo.lock pins the actual revision for reproducibility; bump
# with `cargo update -p playwright-rs`.
allow-git = ["https://github.com/padamson/playwright-rust"]
