name: Security & Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Saturday 5am ET
    - cron: '0 9 * * 6'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  deny:
    name: License & Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo deny
        run: cargo deny check

  supply-chain:
    name: Supply Chain Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-vet
        run: cargo install cargo-vet

      - name: Run cargo vet
        run: |
          if [ -f supply-chain/audits.toml ]; then
            cargo vet
          else
            echo "supply-chain/ not initialized; skipping. Run 'cargo vet init' to enable."
          fi

  semver-checks:
    name: Semver Compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks

      - name: Check semver compatibility
        run: cargo semver-checks check-release

  mutation-testing:
    name: Mutation Testing (full)
    runs-on: ubuntu-latest
    # Full-codebase mutation testing is a manual escape hatch only.
    # Per-push verification is handled by `mutation-testing-diff` below,
    # which scopes to just the lines a push or PR touched. The full run
    # grows linearly with codebase size and eventually exceeds CI's
    # per-job timeout, so we don't schedule it.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-mutants-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mutants-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # Use prebuilt binary via taiki-e/install-action. `cargo install
      # cargo-mutants` fails when the cargo cache restores a previously
      # installed binary into `~/.cargo/bin/` (cargo install refuses to
      # overwrite without --force); the action handles the
      # already-installed case correctly and is ~10x faster anyway.
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      # `.mutants.toml` at the repo root scopes the run (test_tool =
      # nextest, --lib only, examine_globs limited to src/).
      - name: Run mutation testing
        run: cargo mutants

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: mutants.out/

  mutation-testing-diff:
    name: Mutation Testing (diff)
    runs-on: ubuntu-latest
    # Fast per-push variant: scopes to the lines touched in this push or
    # pull request via `cargo mutants --in-diff`. Typical runtime is
    # seconds-to-minutes rather than the full-codebase job's hours.
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history beyond HEAD so `git diff` can reach the base
          # commit (push: `before` SHA; PR: merge base of base ref).
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-mutants-diff-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mutants-diff-
            ${{ runner.os }}-cargo-mutants-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      # Mirror the e2e job's Playwright setup so cargo-mutants's
      # baseline `cargo test` (which honours `.mutants.toml`'s
      # `additional_cargo_test_args = ["--lib"]` for MUTATED runs but
      # not for the baseline) can complete. Without Chromium + driver
      # + a built book, the baseline fails on BrowserNotInstalled and
      # no mutation work happens. Cache key matches ci.yml so browsers
      # downloaded by the regular CI test job are restored here for
      # free (cross-workflow within the same repo).
      - name: Cache Playwright browsers + driver
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright/
            drivers/
          key: ${{ runner.os }}-playwright-${{ hashFiles('Cargo.lock', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install mdbook (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Install mdbook-typst-pdf (padamson fork — dynamic fence-length fix)
        # See ci.yml for the rationale + why no `command -v` guard.
        run: cargo install --git https://github.com/padamson/mdbook-typst-pdf --branch fix/dynamic-fence-length --force

      - name: Install mdbook-admonish (padamson fork — mdbook-0.5 compat)
        run: command -v mdbook-admonish || cargo install --git https://github.com/padamson/mdbook-admonish --branch feat/mdbook-0.5-compat

      - name: Refresh mdbook-admonish assets
        working-directory: book
        run: mdbook-admonish install

      - name: Install mdbook-listings (this crate)
        run: cargo install --path . --locked --force

      - name: Build book (so e2e tests find book/build/html/)
        run: mdbook build book/

      - name: Set up Node (for Playwright driver)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Playwright driver + Chromium
        # Pinned to playwright-rs's bundled PLAYWRIGHT_VERSION; see
        # ci.yml's matching step for the full rationale.
        run: npx --yes playwright@1.60.0 install --with-deps chromium

      # Compute the right diff base for this trigger.
      # - pull_request: merge base against the PR target branch
      # - push: the `before` SHA of the push (the parent of `after`).
      #   First push to a branch has `before = 000...0`; fall back to
      #   HEAD~1 in that case.
      - name: Compute diff base
        id: base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "ref=HEAD~1" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.event.before }}" >> $GITHUB_OUTPUT
          fi

      - name: Run mutation testing on diff
        # `--in-place` mutates the workspace source rather than
        # copying to a tmpdir. The e2e_callouts test binary resolves
        # `CARGO_MANIFEST_DIR` at compile time; with the default
        # copy-to-tmpdir mode the binary looks for `book/build/html/`
        # inside the tmpdir (which cargo-mutants doesn't populate),
        # so e2e tests panic on file-not-found. In-place mode points
        # CARGO_MANIFEST_DIR at the workspace where we just built the
        # book. Safe in CI's ephemeral VM; not used locally (see
        # scripts/mutants.sh, which keeps the default copy mode).
        run: ./scripts/mutants.sh ${{ steps.base.outputs.ref }} -- --in-place

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report-diff
          path: mutants.out/
