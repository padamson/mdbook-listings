name: Dependabot auto-merge

# Auto-squash-merges dependabot PRs that bump minor or patch versions once
# all required checks pass. Major bumps stay individual + manual so they
# get human review.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for safe updates
        # `--auto` queues the squash-merge to fire when branch-protection's
        # required checks all go green. Safe-to-auto-merge:
        #   - any cargo minor or patch bump
        #   - any github-actions bump (action tags are major-numbered, so
        #     dependabot classifies every action bump as semver-major; we
        #     trust the maintainers and the small API surface)
        # Cargo majors fall through and stay awaiting manual review.
        if: |
          steps.meta.outputs.package-ecosystem == 'github_actions' ||
          contains(fromJson('["version-update:semver-minor","version-update:semver-patch"]'), steps.meta.outputs.update-type)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
