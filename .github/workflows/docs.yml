name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, queued; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install fonts (for Typst PDF rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-sil-charis fonts-inter fonts-jetbrains-mono

      - name: Cache Cargo (registry + git + installed bins) and Playwright browsers
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cache/ms-playwright/
          key: ${{ runner.os }}-docs-cargo-${{ hashFiles('.github/workflows/docs.yml') }}
          restore-keys: |
            ${{ runner.os }}-docs-cargo-

      - name: Install mdbook + mdbook-typst-pdf
        # `command -v X || cargo install X` skips reinstall when the cargo
        # bin cache restored an existing binary. mdbook-typst-pdf depends on
        # the `typst` library and bundles the renderer; no separate Typst
        # CLI install is needed.
        run: |
          command -v mdbook           || cargo install mdbook           --locked
          command -v mdbook-typst-pdf || cargo install mdbook-typst-pdf --locked

      - name: Install mdbook-admonish (padamson fork — mdbook-0.5 compat)
        # Stock mdbook-admonish on crates.io isn't mdbook-0.5 compatible
        # yet (tracking upstream PR tommilligan/mdbook-admonish#235).
        # `--force` overrides any cached stock binary in the cargo bin
        # cache from a previous workflow rev. Drop this step and revert
        # to the bundled-install line above when upstream catches up.
        run: cargo install --git https://github.com/padamson/mdbook-admonish --branch feat/mdbook-0.5-compat --force

      - name: Refresh mdbook-admonish assets
        # Regenerates book/mdbook-admonish.css and the assets_version field
        # in book/book.toml to match the mdbook-admonish version just
        # installed. Without this, a version skew between the local install
        # (where the committed assets came from) and the CI install fails
        # the build with `invalid type: null, expected any valid TOML value`
        # when the admonish preprocessor parses its config.
        working-directory: book
        run: mdbook-admonish install

      - name: Install mdbook-listings (local crate, used as preprocessor)
        # `--force` overrides any cached binary from a previous workflow rev.
        # The local crate's source changes commit-to-commit, so we want a
        # fresh install every run.
        run: cargo install --path . --locked --force

      - name: Build book (HTML + PDF)
        run: mdbook build book/

      - name: Set up Node (for Playwright driver)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright driver + Chromium
        # `npx playwright install --with-deps chromium` pulls the system libs
        # Chromium needs plus the browser binary itself. The driver is JS even
        # though our tests are Rust — playwright-rs spawns it over stdio.
        run: npx --yes playwright install --with-deps chromium

      - name: Run browser-side E2E tests against the built book
        # Ignored tests stay ignored here (the slice-1 spec asserts on
        # callout DOM that lands later in the story); each subsequent ch. 4
        # slice that emits new DOM removes the matching `#[ignore]`.
        run: cargo test --test e2e_callouts

      - name: Bundle PDF into the HTML site
        run: |
          set -euo pipefail
          PDF=$(find book/build/typst-pdf -maxdepth 1 -type f -name '*.pdf' | head -n1)
          if [ -n "${PDF}" ]; then
            cp "${PDF}" book/build/html/mdbook-listings.pdf
          else
            echo "No PDF found under book/build/typst-pdf — skipping bundle." >&2
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
