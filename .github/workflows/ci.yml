name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write
  pages: write
  id-token: write
  attestations: write

# Cancel in-progress runs on the same PR; let main and tag runs queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv-1.88

      - name: Check compilation on MSRV
        run: cargo check --workspace

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      # Browser-based e2e_callouts and pdf_callouts tests are excluded here;
      # they need a built book (and Playwright / typst-pdf fonts) and run
      # on the dedicated Linux `e2e` job.
      - name: Run tests
        run: cargo nextest run --workspace -E 'not binary(e2e_callouts) and not binary(pdf_callouts)'

      - name: Run doc-tests
        if: hashFiles('**/src/lib.rs') != ''
        run: cargo test --doc --workspace

      - name: Generate documentation
        run: cargo doc --no-deps --workspace

  e2e:
    name: Browser-based E2E + book build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install fonts (for Typst PDF rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-sil-charis fonts-inter fonts-jetbrains-mono

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Each bump rebuilds the playwright-rs test binary from scratch so
          # build.rs reruns and rebakes PLAYWRIGHT_DRIVER_DIR for the
          # current runner image. Earlier bumps (v2→v3) were triggered by
          # rustc-toolchain bumps on the GitHub-hosted runner; v4 bumps
          # again because the driver path baked in v3's cache no longer
          # matches the current runner's `drivers/` layout (slice 7 e2e
          # tests fail with `ServerNotFound`).
          shared-key: e2e-v4

      # Cache the Playwright browser binaries (~/.cache/ms-playwright/) and
      # the playwright-rs driver (drivers/ at workspace root). The driver is
      # downloaded once by playwright-rs's build.rs and its absolute path is
      # baked into the compiled test binary via cargo:rustc-env — Swatinem
      # caches target/ and so the binary stays valid across runs, but the
      # driver lives OUTSIDE target/ so it needs its own cache key.
      - name: Cache Playwright browsers + driver
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright/
            drivers/
          key: ${{ runner.os }}-playwright-${{ hashFiles('Cargo.lock', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install mdbook (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Resolve mdbook-typst-pdf fork SHA
        # SHA-pin the install so a transient upstream regression on the
        # fork branch surfaces on the SAME commit it landed on, not
        # whenever the runner's cargo cache happens to miss.
        id: typst-pdf-sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/padamson/mdbook-typst-pdf/commits/fix/dynamic-fence-length --jq .sha)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Install mdbook-typst-pdf (padamson fork — dynamic fence-length fix)
        # Stock mdbook-typst-pdf uses a fixed 4-backtick wrapper fence
        # that breaks on diff content containing 4-backtick string
        # literals. The fork branch scans body content for the longest
        # backtick run and uses ≥max+1 backticks for the wrapper.
        # Pinned here until the upstream PR merges + a new release ships.
        # --force always overwrites the cached binary (no `command -v`
        # short-circuit, which would let a stock-release binary from a
        # prior run silently shadow the fork install). --locked uses
        # the fork's Cargo.lock so transitive resolution doesn't drift
        # across runs (otherwise crates.io updates between runs can
        # pick versions that won't compile on the runner's Rust).
        run: cargo install --git https://github.com/padamson/mdbook-typst-pdf --rev ${{ steps.typst-pdf-sha.outputs.sha }} --locked --force

      - name: Resolve mdbook-admonish fork SHA
        id: admonish-sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/padamson/mdbook-admonish/commits/feat/mdbook-0.5-compat --jq .sha)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Install mdbook-admonish (padamson fork — mdbook-0.5 compat)
        # Stock mdbook-admonish on crates.io isn't mdbook-0.5 compatible
        # yet; tracking upstream PR tommilligan/mdbook-admonish#235.
        # SHA-pinned + --locked same as the typst-pdf install above.
        run: cargo install --git https://github.com/padamson/mdbook-admonish --rev ${{ steps.admonish-sha.outputs.sha }} --locked --force

      - name: Refresh mdbook-admonish assets
        working-directory: book
        run: mdbook-admonish install

      - name: Install mdbook-listings (local crate, used as preprocessor)
        run: cargo install --path . --locked --force

      - name: Build book (HTML + PDF)
        run: mdbook build book/

      - name: Set up Node (for Playwright driver)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Playwright driver + Chromium
        # Pinned to playwright-rs's bundled PLAYWRIGHT_VERSION (see
        # crates/playwright/build.rs in the playwright-rust fork). Without
        # the pin, npx resolves the latest playwright on npm, which bumps
        # the chromium browser revision faster than playwright-rs's driver
        # tracks it — `npx playwright install` removes the cached older
        # chromium and downloads the newer one, then the driver fails at
        # launch with `BrowserNotInstalled: Executable doesn't exist at
        # .../chromium_headless_shell-<old-rev>/...` because it expects
        # the rev it was built against. Bump this version in lockstep
        # with playwright-rs's PLAYWRIGHT_VERSION constant.
        run: npx --yes playwright@1.60.0 install --with-deps chromium

      - name: Run browser-based E2E tests
        run: cargo test --test e2e_callouts

      - name: Run PDF content tests
        # Asserts the typst-pdf renderer's callout output. Requires the
        # PDF that the previous `mdbook build` step produced. The test is
        # `#[ignore]`d locally (~20s extracting the full book PDF) and
        # explicitly opted into here.
        run: cargo test --test pdf_callouts -- --ignored

      - name: Bundle PDF into the HTML site
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          PDF=$(find book/build/typst-pdf -maxdepth 1 -type f -name '*.pdf' | head -n1)
          if [ -n "${PDF}" ]; then
            cp "${PDF}" book/build/html/mdbook-listings.pdf
          else
            echo "No PDF found under book/build/typst-pdf — skipping bundle." >&2
          fi

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: book/build/html

  deploy-book:
    name: Deploy book to GitHub Pages
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Allow one concurrent deployment, queued; don't cancel in-progress runs.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  build-release:
    name: Build release ${{ matrix.target }}
    needs: e2e
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install parse-changelog
        uses: taiki-e/install-action@v2
        with:
          tool: parse-changelog

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --verbose
        continue-on-error: true

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY_NAME=$(cargo metadata --no-deps --format-version 1 | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; bins=[t['name'] for p in pkgs for t in p['targets'] if 'bin' in t['kind']]; print(bins[0] if bins else '')")
          if [ -n "$BINARY_NAME" ] && [ -f "target/${{ matrix.target }}/release/$BINARY_NAME" ]; then
            strip "target/${{ matrix.target }}/release/$BINARY_NAME"
          fi
        continue-on-error: true

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY_NAME=$(cargo metadata --no-deps --format-version 1 | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; bins=[t['name'] for p in pkgs for t in p['targets'] if 'bin' in t['kind']]; print(bins[0] if bins else '')")
          if [ -n "$BINARY_NAME" ] && [ -f "target/${{ matrix.target }}/release/$BINARY_NAME" ]; then
            tar czf "$BINARY_NAME-v${{ steps.get_version.outputs.version }}-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" "$BINARY_NAME"
          fi
        continue-on-error: true

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BINARY_NAME=$(cargo metadata --no-deps --format-version 1 | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; bins=[t['name'] for p in pkgs for t in p['targets'] if 'bin' in t['kind']]; print(bins[0] if bins else '')")
          if [ -n "$BINARY_NAME" ] && [ -f "target/${{ matrix.target }}/release/${BINARY_NAME}.exe" ]; then
            7z a "${BINARY_NAME}-v${{ steps.get_version.outputs.version }}-${{ matrix.target }}.zip" "target/${{ matrix.target }}/release/${BINARY_NAME}.exe"
          fi
        continue-on-error: true

      - name: Generate release notes
        shell: bash
        run: parse-changelog CHANGELOG.md ${{ steps.get_version.outputs.version }} > release_notes.md

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.tar.gz
            *.zip
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            *.tar.gz
            *.zip
        continue-on-error: true

  publish-crates:
    name: Publish to crates.io
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check if token is set
        id: check_token
        run: |
          if [ -z "${{ secrets.CARGO_REGISTRY_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "CARGO_REGISTRY_TOKEN not set, skipping crates.io publishing"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to crates.io
        if: steps.check_token.outputs.skip == 'false'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
